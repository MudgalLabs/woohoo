services:
    db:
        container_name: woohoo_db
        image: postgres:17.4-alpine
        environment:
            PGPORT: 42071
            POSTGRES_DB: ${WOOHOO_DB_NAME}
            POSTGRES_USER: ${WOOHOO_DB_USER}
            POSTGRES_PASSWORD: ${WOOHOO_DB_PASSWORD}
        networks:
            - woohoo_network
        volumes:
            - ./volumes/db_data:/var/lib/postgresql/data
        restart: unless-stopped
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${WOOHOO_DB_USER} -d ${WOOHOO_DB_NAME}",
                ]
            interval: 10s
            timeout: 5s
            retries: 5

    migrate:
        container_name: woohoo_migrate
        build:
            context: ./web
            dockerfile: Dockerfile
        image: woohoo_web:latest
        command:
            [
                "node",
                "/app/node_modules/prisma/build/index.js",
                "migrate",
                "deploy",
            ]
        environment:
            DATABASE_URL: postgres://${WOOHOO_DB_USER}:${WOOHOO_DB_PASSWORD}@db:42071/${WOOHOO_DB_NAME}?sslmode=disable
        depends_on:
            db:
                condition: service_healthy
        networks:
            - woohoo_network
        restart: "no"

    web:
        container_name: woohoo_web
        build:
            context: ./web
        image: woohoo_web:latest
        ports:
            - 3000:3000
        env_file: .env
        environment:
            NODE_ENV: production
            PORT: 3000
            HOSTNAME: 0.0.0.0
            DATABASE_URL: postgres://${WOOHOO_DB_USER}:${WOOHOO_DB_PASSWORD}@db:42071/${WOOHOO_DB_NAME}?sslmode=disable
        depends_on:
            db:
                condition: service_healthy
            migrate:
                condition: service_completed_successfully
        networks:
            - woohoo_network
            - caddy_net
        restart: unless-stopped

networks:
    woohoo_network:
        name: woohoo_network
    caddy_net:
        external: true
